name: Data Correction
description: Report incorrect, outdated, or missing information in an existing profile
labels: ["correction"]
body:
  - type: input
    id: name
    attributes:
      label: Organization or person name
      placeholder: "Acme AI Inc."
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Record type
      options:
        - Organization
        - Person
    validations:
      required: true

  - type: textarea
    id: what-is-wrong
    attributes:
      label: What is incorrect or outdated?
      description: Describe what's wrong with the current record
      placeholder: "The website URL is outdated. The company moved from Vancouver to Victoria in 2025."
    validations:
      required: true

  - type: textarea
    id: correct-info
    attributes:
      label: Correct information
      placeholder: "New website: https://... New location: Victoria, BC"
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Source URL confirming the correction
      placeholder: "https://..."
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - Low — informational correction
        - Medium — outdated information
        - High — factually wrong in a way that could mislead users
        - Critical — privacy concern or request for removal
    validations:
      required: true
